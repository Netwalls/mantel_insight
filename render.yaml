services:
  - type: web
    name: alphasight-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alphasight-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: alphasight-redis
          type: redis
          property: connectionString
      - key: MANTLE_RPC_URL
        value: https://rpc.mantle.xyz
      - key: MANTLE_CHAIN_ID
        value: "5000"
      - key: MANTLE_TESTNET_RPC_URL
        value: https://rpc.sepolia.mantle.xyz
      - key: MANTLE_TESTNET_CHAIN_ID
        value: "5003"
      - key: CONTRACT_ADDRESS
        value: "0x9C6cBEaBF1931Bc677db34aDDa02df1E9dC132bf"
      - key: JWT_SECRET
        generateValue: true
      # Set these manually in the Render dashboard:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: redis
    name: alphasight-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: alphasight-db
    databaseName: alphasight
    user: alphasight
    plan: free
